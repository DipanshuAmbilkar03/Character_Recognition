<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digit Recognition</title>
  <style>
    :root {
      --bg: #f2efe8;
      --card: #fffaf0;
      --ink: #1b1b1b;
      --accent: #1f6f78;
      --accent-2: #e07a5f;
      --muted: #5a5a5a;
      --border: #d8d2c4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #fff3d5 0, transparent 35%),
        radial-gradient(circle at 90% 80%, #dff3f4 0, transparent 40%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .panel {
      width: min(880px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 24px;
      display: grid;
      gap: 20px;
      animation: rise 350ms ease-out;
    }

    @keyframes rise {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 760px) {
      .workspace { grid-template-columns: 1fr; }
    }

    .canvas-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      padding: 12px;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border: 1px dashed #bbb;
      border-radius: 8px;
      touch-action: none;
      cursor: crosshair;
      background: white;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .predict {
      background: var(--accent);
      color: white;
    }

    .clear {
      background: var(--accent-2);
      color: white;
    }

    .result {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .big {
      font-size: 2.2rem;
      font-weight: 900;
      margin: 6px 0;
    }

    .small { color: var(--muted); }

    .probs {
      margin-top: 8px;
      display: grid;
      gap: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: 22px 1fr 54px;
      gap: 8px;
      align-items: center;
      font-size: 0.9rem;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: #ece9df;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #2ba2ad);
      width: 0;
      transition: width 220ms ease;
    }

    .error {
      color: #b42318;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="panel">
    <header>
      <h1>Handwritten Digit Recognition</h1>
      <p class="subtitle">Draw one digit (0-9) and run prediction from your trained model.</p>
    </header>

    <section class="workspace">
      <div class="canvas-wrap">
        <canvas id="board" width="280" height="280" aria-label="Drawing canvas"></canvas>
        <div class="actions">
          <button class="predict" id="predictBtn" type="button">Predict</button>
          <button class="clear" id="clearBtn" type="button">Clear</button>
        </div>
      </div>

      <div class="result" id="result">
        <div class="small">Predicted Digit</div>
        <div class="big" id="digit">-</div>
        <div class="small" id="confidence">Confidence: -</div>
        <div class="probs" id="probs"></div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const predictBtn = document.getElementById('predictBtn');
    const clearBtn = document.getElementById('clearBtn');
    const digitEl = document.getElementById('digit');
    const confidenceEl = document.getElementById('confidence');
    const probsEl = document.getElementById('probs');

    let drawing = false;

    function resetCanvas() {
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 18;
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'black';
    }

    function pointerPos(event) {
      const rect = canvas.getBoundingClientRect();
      const source = event.touches ? event.touches[0] : event;
      return {
        x: (source.clientX - rect.left) * (canvas.width / rect.width),
        y: (source.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function startDraw(event) {
      event.preventDefault();
      drawing = true;
      const { x, y } = pointerPos(event);
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    function draw(event) {
      if (!drawing) return;
      event.preventDefault();
      const { x, y } = pointerPos(event);
      ctx.lineTo(x, y);
      ctx.stroke();
    }

    function endDraw() {
      drawing = false;
      ctx.beginPath();
    }

    async function predict() {
      predictBtn.disabled = true;
      predictBtn.textContent = 'Predicting...';

      try {
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const formData = new FormData();
        formData.append('image', blob, 'drawing.png');

        const response = await fetch('/predict', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          digitEl.textContent = 'Error';
          confidenceEl.innerHTML = '<span class="error">' + (data.error || 'Prediction failed') + '</span>';
          probsEl.innerHTML = '';
          return;
        }

        digitEl.textContent = data.prediction;
        confidenceEl.textContent = 'Confidence: ' + (data.confidence * 100).toFixed(2) + '%';

        probsEl.innerHTML = '';
        data.probabilities.forEach((p, i) => {
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML =
            '<span>' + i + '</span>' +
            '<div class="bar"><div class="fill" style="width:' + (p * 100).toFixed(2) + '%"></div></div>' +
            '<span>' + (p * 100).toFixed(1) + '%</span>';
          probsEl.appendChild(row);
        });
      } catch (error) {
        digitEl.textContent = 'Error';
        confidenceEl.innerHTML = '<span class="error">' + error.message + '</span>';
        probsEl.innerHTML = '';
      } finally {
        predictBtn.disabled = false;
        predictBtn.textContent = 'Predict';
      }
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', endDraw);

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    window.addEventListener('touchend', endDraw);

    clearBtn.addEventListener('click', () => {
      resetCanvas();
      digitEl.textContent = '-';
      confidenceEl.textContent = 'Confidence: -';
      probsEl.innerHTML = '';
    });

    predictBtn.addEventListener('click', predict);

    resetCanvas();
  </script>
</body>
</html>
